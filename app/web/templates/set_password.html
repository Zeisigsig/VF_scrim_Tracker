{% extends "base.html" %}
{% block title %}비밀번호 설정 · 내전 트래커{% endblock %}
{% block content %}
<div class="panel" style="max-width:460px;">
    <h2>{% if forced %}비밀번호 설정{% else %}비밀번호 변경{% endif %}</h2>
    {% if forced %}
    <p class="muted">첫 로그인입니다. 계속하려면 새 비밀번호를 설정하세요.</p>
    {% endif %}
    {% if error %}<p class="notice-dup" style="padding:8px 10px;border-radius:6px;">
        비밀번호는 4자 이상이어야 하며 두 입력이 같아야 합니다.</p>{% endif %}
    <form method="post" action="/account/password" class="stack">
        <label>새 비밀번호
            <input type="password" name="new_password" autocomplete="new-password" required>
        </label>
        <label>새 비밀번호 확인
            <input type="password" name="confirm_password" autocomplete="new-password" required>
        </label>
        <button type="submit">저장</button>
    </form>
</div>
{% endblock %}
